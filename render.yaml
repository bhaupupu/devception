services:
  - type: web
    name: devception
    runtime: docker
    plan: free
    region: oregon
    rootDir: .
    dockerContext: ./devception-server
    dockerfilePath: ./devception-server/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        value: https://devception.vercel.app
      - key: CLIENT_ORIGINS
        value: https://devception.vercel.app,http://localhost:3000
      - key: ALLOW_VERCEL_PREVIEWS
        value: "false"
      - key: IMPOSTER_BUG_COOLDOWN_MS
        value: "45000"
      - key: IMPOSTER_BLUR_COOLDOWN_MS
        value: "60000"
      - key: IMPOSTER_HINT_COOLDOWN_MS
        value: "30000"
      - key: GAME_DURATION_MS
        value: "900000"
      - key: MEETING_DISCUSSION_MS
        value: "60000"
      - key: MEETING_VOTING_MS
        value: "30000"
      - key: MAX_PLAYERS
        value: "8"
      - key: MIN_PLAYERS
        value: "4"
